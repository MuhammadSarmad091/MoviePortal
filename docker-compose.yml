version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: movie_app_backend
    environment:
      NODE_ENV: production
      BACKEND_PORT: 5000
    env_file:
      - .env
    ports:
      - "5000:5000"
    networks:
      - movie_app_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: movie_app_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - movie_app_network
    restart: unless-stopped

networks:
  movie_app_network:
    driver: bridge
