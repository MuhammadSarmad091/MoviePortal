version: '3.8'

services:
  mongodb-test:
    image: mongo:6.0
    container_name: mongodb-test
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: testuser
      MONGO_INITDB_ROOT_PASSWORD: testpass
      MONGO_INITDB_DATABASE: test_db
    volumes:
      - mongodb_test_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh -u testuser -p testpass --authenticationDatabase admin localhost:27017/test_db --quiet
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    # Resource limits for test database
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  mongodb_test_data:
    driver: local
